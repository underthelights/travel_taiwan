<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교통·기차표 ㅣ The Summer of Taipei</title>
<meta name="description" content="대만 2박3일 여행의 교통카드, 고속철 예매, 교통패스 비교와 실제 이동 방식.">
<meta name="theme-color" content="#f3ead8">
<link rel="canonical" href="https://underthelights.github.io/travel_taiwan/">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta property="og:type" content="website">
<meta property="og:locale" content="ko_KR">
<meta property="og:site_name" content="The Summer of Taipei">
<meta property="og:title" content="대만 교통·기차표 가이드">
<meta property="og:description" content="EasyCard, THSR 구간권, 타이베이 패스와 실제 이동 판단.">
<meta property="og:url" content="https://underthelights.github.io/travel_taiwan/">
<meta property="og:image" content="https://underthelights.github.io/travel_taiwan/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
<style>
  .mobility-hero{display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:22px; align-items:end; overflow:hidden; position:relative;
    background:
      radial-gradient(circle at 86% 14%,rgba(110,168,255,.18),transparent 28%),
      linear-gradient(135deg,#151923,#10131a);
    border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:24px; margin-bottom:18px;
    box-shadow:0 22px 54px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);}
  .mobility-hero::before{content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 4px); opacity:.34;}
  .mobility-hero .eyebrow{display:block; color:var(--accent); font-size:11px; font-weight:800; letter-spacing:0; margin-bottom:8px;}
  .mobility-hero h1{font-size:26px; line-height:1.25; letter-spacing:0; margin:0;}
  .mobility-hero p{color:#cfd6e4; font-size:13.5px; line-height:1.65; margin-top:8px; max-width:760px;}
  .mobility-hero > div,.wallet-stack{position:relative; z-index:1;}
  .wallet-stack{height:190px; align-self:center;}
  .physical-card{position:absolute; right:0; width:245px; height:154px; border-radius:18px; padding:18px;
    color:#f8f4ec; border:1px solid rgba(255,255,255,.22); overflow:hidden;
    box-shadow:0 28px 42px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.28);
    transform-origin:center;}
  .physical-card::before{content:""; position:absolute; inset:-45% -18% auto -18%; height:110px;
    background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.34) 45%,transparent 76%);
    transform:rotate(-9deg); opacity:.46;}
  .physical-card::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.22;
    background:radial-gradient(circle at 22% 20%,#fff 0 1px,transparent 1.5px),
      radial-gradient(circle at 72% 72%,#fff 0 1px,transparent 1.5px);
    background-size:18px 18px,22px 22px;}
  .physical-card.easy{top:6px; right:28px; background:linear-gradient(145deg,#287d69,#43a78c 52%,#1d4d55); transform:rotate(-7deg);}
  .physical-card.rail{top:42px; right:0; color:#1b2430; background:linear-gradient(145deg,#f5efe4,#d9e4ee 58%,#f8f2e6); transform:rotate(5deg);}
  .card-brand{display:block; font-size:12px; font-weight:900; letter-spacing:0; opacity:.82;}
  .card-name{position:absolute; left:18px; bottom:18px; font-size:20px; line-height:1.1; font-weight:850;}
  .card-chip{position:absolute; left:18px; top:48px; width:38px; height:28px; border-radius:7px;
    background:linear-gradient(135deg,#f3d27c,#a36b25); border:1px solid rgba(78,43,8,.55);}
  .card-chip::before,.card-chip::after{content:""; position:absolute; left:8px; right:8px; height:1px; background:rgba(63,35,6,.45);}
  .card-chip::before{top:9px;} .card-chip::after{bottom:9px;}
  .card-wave{position:absolute; right:18px; top:49px; width:38px; height:30px; border-right:3px solid currentColor; border-radius:50%; opacity:.55;}
  .card-wave::before,.card-wave::after{content:""; position:absolute; top:5px; right:6px; width:24px; height:18px; border-right:3px solid currentColor; border-radius:50%;}
  .card-wave::after{top:10px; right:13px; width:12px; height:8px;}
  .ticket-cut{position:absolute; left:0; right:0; top:49%; border-top:1px dashed rgba(27,36,48,.28);}
  .ticket-cut::before,.ticket-cut::after{content:""; position:absolute; top:-11px; width:22px; height:22px; border-radius:50%; background:#11131a;}
  .ticket-cut::before{left:-12px;} .ticket-cut::after{right:-12px;}
  .updated{position:absolute; left:4px; bottom:0; color:rgba(248,244,236,.7); font-size:12px; padding:7px 10px;
    border:1px solid rgba(255,255,255,.14); border-radius:999px; background:rgba(255,255,255,.07); backdrop-filter:blur(12px);}
  .answer-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:22px;}
  .answer-card,.route-step,.pass-card,.book-card,.leg-row,.decision-note,.source-box,.step-list{
    background:linear-gradient(145deg,rgba(34,39,52,.98),rgba(23,27,36,.98));
    border:1px solid rgba(255,255,255,.1); border-radius:14px;
    box-shadow:0 14px 30px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.05);}
  .answer-card{padding:15px; position:relative; overflow:hidden;}
  .answer-card::after{content:""; position:absolute; right:-22px; bottom:-28px; width:92px; height:92px; border-radius:50%;
    border:1px solid rgba(255,255,255,.08);}
  .answer-card span{display:block; color:var(--sub); font-size:11px; font-weight:800; margin-bottom:7px;}
  .answer-card b{display:block; font-size:16px; line-height:1.35;}
  .answer-card p{color:#d3d9e7; font-size:12.5px; line-height:1.55; margin-top:7px;}
  .route-flow{display:grid; gap:10px;}
  .route-step{display:grid; grid-template-columns:82px minmax(0,1fr) minmax(220px,.8fr); gap:12px; align-items:start; padding:13px 14px;}
  .route-step .day{color:var(--accent2); font-size:12px; font-weight:900;}
  .route-step b{display:block; font-size:14px; line-height:1.4;}
  .route-step p{color:var(--sub); font-size:12.5px; line-height:1.55;}
  .pass-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px;}
  .pass-card{position:relative; min-height:158px; padding:16px; overflow:hidden; border-left:0;
    background:
      radial-gradient(circle at 86% 18%,rgba(255,255,255,.13),transparent 28%),
      linear-gradient(145deg,#202635,#151923);}
  .pass-card::before{content:""; position:absolute; right:18px; bottom:18px; width:54px; height:38px; border-radius:10px;
    background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.02)); border:1px solid rgba(255,255,255,.11);}
  .pass-card::after{content:""; position:absolute; right:-32px; top:-48px; width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle,rgba(110,168,255,.18),transparent 64%);}
  .pass-card.is-best{background:
      radial-gradient(circle at 84% 20%,rgba(255,255,255,.16),transparent 30%),
      linear-gradient(145deg,#1f6f61,#172835);}
  .pass-card > *{position:relative; z-index:1;}
  .pass-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px;}
  .pass-top b{font-size:15px;}
  .verdict{flex:0 0 auto; color:#10141b; background:#c3ccd9; border-radius:999px; padding:3px 8px; font-size:11px; font-weight:900;}
  .is-best .verdict{background:#5ed09a;}
  .pass-meta{color:var(--accent2); font-size:12px; font-weight:800; margin-bottom:6px;}
  .pass-card p{color:#d3d9e7; font-size:12.5px; line-height:1.55;}
  .leg-row{position:relative; display:grid; grid-template-columns:150px minmax(0,1fr) 150px; gap:12px; align-items:center;
    padding:13px 16px; margin-bottom:9px; overflow:hidden;
    background:linear-gradient(145deg,#f2eadf,#dfe7ef); color:#18202b; border:1px solid rgba(0,0,0,.08);
    box-shadow:0 14px 26px rgba(0,0,0,.18);}
  .leg-row::before,.leg-row::after{content:""; position:absolute; top:50%; width:22px; height:22px; border-radius:50%;
    background:#0f1115; transform:translateY(-50%);}
  .leg-row::before{left:-12px;} .leg-row::after{right:-12px;}
  .leg-row > *{position:relative; z-index:1;}
  .leg-row .line{color:#0b1118; background:var(--accent); border-radius:6px; padding:5px 8px; text-align:center; font-size:11px; font-weight:900;}
  .leg-row b{display:block; font-size:14px;}
  .leg-row small{display:block; color:#627084; font-size:11.5px; margin-top:3px;}
  .leg-row .fare{text-align:right; color:#9a5a1d; font-size:12.5px; font-weight:850;}
  .book-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px;}
  .book-card{position:relative; padding:14px; border-top:0; overflow:hidden;}
  .book-card::before{content:""; display:block; height:4px; margin:-14px -14px 12px; background:linear-gradient(90deg,#6ea8ff,#ffd36a);}
  .book-card b{display:block; font-size:14px; margin-bottom:7px;}
  .book-card p{color:#d3d9e7; font-size:12.5px; line-height:1.55;}
  .book-card small{display:block; color:var(--accent2); font-size:11.5px; font-weight:800; line-height:1.45; margin-top:8px;}
  .ana{display:grid; grid-template-columns:1fr 1fr 2fr; gap:0; font-size:13px;}
  .ana .h{font-weight:800; color:var(--accent); padding:8px 10px; border-bottom:1px solid var(--line);}
  .ana .c{padding:9px 10px; border-bottom:1px dashed var(--line); color:var(--sub);}
  .ana .c b{color:var(--txt);}
  .disc{padding:0; margin:0;}
  .disc li{list-style:none; display:grid; grid-template-columns:170px minmax(0,1fr); gap:12px; font-size:13px; padding:8px 0; border-bottom:1px dashed var(--line); color:var(--sub);}
  .disc li:last-child{border:none;}
  .disc b{color:var(--txt);}
  .step-list{padding:14px 16px;}
  .step-list ol{margin:0; padding-left:20px;}
  .step-list li{color:#d3d9e7; font-size:13px; line-height:1.65; padding:3px 0;}
  .decision-note{border-left:3px solid var(--accent2); padding:14px 16px; color:#d3d9e7; font-size:13px; line-height:1.65;}
  .decision-note b{color:var(--accent2);}
  .source-box{display:flex; flex-wrap:wrap; gap:8px; padding:12px; margin-top:18px;}
  .source-box a{color:var(--sub); border:1px solid var(--line); border-radius:999px; padding:6px 9px; text-decoration:none; font-size:12px;}
  .source-box a:hover{color:var(--txt); border-color:var(--accent);}
  @media(max-width:860px){
    .mobility-hero,.answer-grid,.pass-grid,.book-grid{grid-template-columns:1fr;}
    .updated{justify-self:start;}
    .wallet-stack{height:174px; margin-top:6px;}
    .physical-card{width:220px; height:138px;}
    .route-step,.leg-row,.disc li{grid-template-columns:1fr;}
    .leg-row .fare{text-align:left;}
    .ana{grid-template-columns:1fr;}
    .ana .h:nth-child(1),.ana .h:nth-child(2),.ana .h:nth-child(3){display:none;}
  }
</style>
</head>
<body>

<main class="wrap">
  <section class="mobility-hero">
    <div>
      <span class="eyebrow">대만 교통 정리</span>
      <h1>교통은 EasyCard와 고속철 구간권으로 정리</h1>
      <p>한국 기후동행카드나 도쿄 메트로패스 같은 상품은 대만에도 있지만, 이번 일정은 타이베이 시내 이동보다 타이중-신주-타이베이 고속철 판단이 더 중요하다.</p>
    </div>
    <aside class="wallet-stack" aria-hidden="true">
      <div class="physical-card easy">
        <span class="card-brand">EASYCARD</span>
        <span class="card-chip"></span>
        <span class="card-wave"></span>
        <span class="card-name">Taipei<br>Transit</span>
      </div>
      <div class="physical-card rail">
        <span class="card-brand">THSR TICKET</span>
        <span class="ticket-cut"></span>
        <span class="card-name">Taichung<br>Taipei</span>
      </div>
      <span class="updated" id="updated"></span>
    </aside>
  </section>

  <section class="answer-grid" id="answerBox"></section>

  <div class="section-title">이동 순서</div>
  <section class="route-flow" id="flowBox"></section>

  <div class="section-title">교통카드와 패스</div>
  <section class="pass-grid" id="passBox"></section>

  <div class="section-title">고속철 구간권</div>
  <section id="legBox"></section>

  <div class="section-title">예매 방법</div>
  <section class="book-grid" id="bookBox"></section>

  <div class="section-title">할인 판단</div>
  <div class="card"><ul class="disc" id="discBox"></ul></div>

  <div class="section-title">한국식으로 보면</div>
  <div class="card"><div class="ana" id="anaBox"></div></div>

  <div class="section-title">현장 사용 순서</div>
  <div class="step-list"><ol id="stepBox"></ol></div>

  <div class="section-title">최종 판단</div>
  <div class="decision-note" id="tipBox"></div>
  <div class="source-box" id="sourceBox"></div>
</main>

<script src="data.js"></script>
<script>
const TI = window.TRIP.trainInfo;

document.getElementById('updated').textContent = TI.updated || '';

document.getElementById('answerBox').innerHTML = TI.answer.map(a=>`
  <article class="answer-card">
    <span>${a.k}</span>
    <b>${a.v}</b>
    <p>${a.desc}</p>
  </article>`).join('');

document.getElementById('flowBox').innerHTML = TI.movement.map(m=>`
  <article class="route-step">
    <span class="day">${m.day}</span>
    <div><b>${m.route}</b></div>
    <p>${m.ticket}</p>
  </article>`).join('');

document.getElementById('passBox').innerHTML = TI.cards.map(c=>`
  <article class="pass-card ${c.verdict === '추천' ? 'is-best' : ''}">
    <div class="pass-top"><b>${c.name}</b><span class="verdict">${c.verdict}</span></div>
    <div class="pass-meta">${c.type} · ${c.price}</div>
    <p>${c.desc}</p>
  </article>`).join('');

document.getElementById('legBox').innerHTML = TI.legs.map(l=>`
  <article class="leg-row">
    <span class="line">${l.line}</span>
    <div><b>${l.seg}</b><small>${l.note}</small></div>
    <span class="fare">${l.time}<br>${l.fare}</span>
  </article>`).join('');

document.getElementById('bookBox').innerHTML = TI.booking.map(b=>`
  <article class="book-card">
    <b>${b.way}</b>
    <p>${b.how}</p>
    <small>${b.best}</small>
  </article>`).join('');

document.getElementById('discBox').innerHTML =
  TI.discounts.map(d=>`<li><b>${d[0]}</b><span>${d[1]}</span></li>`).join('');

document.getElementById('anaBox').innerHTML =
  '<div class="h">대만</div><div class="h">한국식 감각</div><div class="h">설명</div>' +
  TI.analogy.map(a=>`<div class="c"><b>${a.tw}</b></div><div class="c"><b>${a.kr}</b></div><div class="c">${a.desc}</div>`).join('');

document.getElementById('stepBox').innerHTML = TI.howto.map(s=>`<li>${s}</li>`).join('');
document.getElementById('tipBox').innerHTML = TI.tip;
document.getElementById('sourceBox').innerHTML = TI.sources.map(s=>`
  <a href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join('');
</script>
</body>
</html>
