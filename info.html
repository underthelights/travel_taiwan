<meta property="og:description" content="출국 전 체크리스트, 수하물, 현금, 통신, 지도 저장만 모은 준비 페이지.">

<link rel="stylesheet" href="style.css">
<style>
  .prep-hero{background:linear-gradient(135deg,#171d28,#12151c); border:1px solid var(--line); border-radius:14px; padding:22px 24px; margin-bottom:18px;}
  .prep-hero span{display:block; color:var(--accent2); font-size:11px; font-weight:900; letter-spacing:0; margin-bottom:8px;}
  .prep-hero h1{font-size:28px; line-height:1.2; margin:0;}
  .prep-hero p{max-width:760px; color:#d2d8e6; font-size:13.5px; line-height:1.7; margin-top:8px;}
  .prep-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px;}
  .prep-card{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:15px;}
  .prep-card h2{font-size:15px; margin-bottom:10px;}
  .prep-card ul,.mini-list{display:grid; gap:7px; margin:0; padding:0;}
  .prep-card li,.mini-list li{list-style:none; color:#d2d8e6; font-size:12.8px; line-height:1.45; padding-left:17px; position:relative;}
  .prep-card li::before,.mini-list li::before{content:""; position:absolute; left:0; top:.62em; width:6px; height:6px; border-radius:50%; background:var(--accent);}
  .prep-split{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .todo-row{display:grid; grid-template-columns:90px minmax(0,1fr); gap:10px; align-items:start; padding:10px 0; border-bottom:1px dashed var(--line);}
  .todo-row:last-child{border-bottom:0;}
  .todo-row b{color:var(--accent2); font-size:12.5px;}
  .todo-row span{color:#d2d8e6; font-size:13px; line-height:1.5;}
  .map-steps{counter-reset:step; display:grid; gap:8px;}
  .map-steps li{counter-increment:step; list-style:none; color:#d2d8e6; font-size:13px; line-height:1.5; padding:9px 11px 9px 40px; background:#14171e; border:1px solid var(--line); border-radius:8px; position:relative;}
  .map-steps li::before{content:counter(step); position:absolute; left:11px; top:8px; width:20px; height:20px; border-radius:50%; background:var(--accent); color:#001; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900;}
  @media(max-width:860px){
    .prep-grid{grid-template-columns:1fr 1fr;}
    .prep-split{grid-template-columns:1fr;}
  }
  @media(max-width:620px){
    .prep-grid{grid-template-columns:1fr;}
    .prep-hero{padding:20px;}
  }
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="index.html" aria-label="The Summer of Taipei 홈"><img src="assets/blog-icon.png" alt="">The Summer of Taipei</a>
  <a href="index.html">홈</a>
  <a href="day.html?d=1" class="d1">1일차</a>
  <a href="day.html?d=2" class="d2">2일차</a>
  <a href="day.html?d=3" class="d3">3일차</a>
  <a href="eat.html">먹킷리스트</a>
  <a href="train.html">교통</a>
  <a href="info.html" class="active">준비물</a>
</nav>
<script src="nav.js"></script>

<main class="wrap">
  <section class="prep-hero">
    <span>출국 전 체크</span>
    <h1>출국 전에 챙길 것만</h1>
    <p>이 페이지는 준비물 전용입니다. 교통패스와 기차표 판단은 교통 페이지, 도시 배경지식은 타이완 노트에 분리했습니다.</p>
  </section>

  <div class="section-title">출국 전 체크리스트</div>
  <section class="prep-grid" id="checkBox"></section>

  <div class="section-title">수하물</div>
  <section class="prep-split" id="bagBox"></section>

  <div class="section-title">아직 결정할 것</div>
  <section class="card" id="todoBox"></section>

  <div class="section-title">내 구글맵에 넣기</div>
  <section class="card">
    <div class="cardh"><a href="taiwan_trip.kml" download style="color:var(--accent)">taiwan_trip.kml 다운로드</a></div>
    <ol class="map-steps" id="mapBox"></ol>
  </section>

  <div class="section-title">예산 상세</div>
  <section class="card"><ul class="budget" id="budgetBox"></ul></section>
</main>

<script src="data.js"></script>
<script>
const T = window.TRIP;
const P = T.prepInfo;

document.getElementById('checkBox').innerHTML = P.checklist.map(group=>`
  <article class="prep-card">
    <h2>${group.title}</h2>
    <ul>${group.items.map(item=>`<li>${item}</li>`).join('')}</ul>
  </article>`).join('');

document.getElementById('bagBox').innerHTML = P.baggage.map(group=>`
  <article class="prep-card">
    <h2>${group.title}</h2>
    <ul>${group.items.map(item=>`<li>${item}</li>`).join('')}</ul>
  </article>`).join('');

document.getElementById('todoBox').innerHTML = P.todo.map(row=>`
  <div class="todo-row"><b>${row[0]}</b><span>${row[1]}</span></div>`).join('');

document.getElementById('mapBox').innerHTML = P.mapSteps.map(step=>`<li>${step}</li>`).join('');

document.getElementById('budgetBox').innerHTML =
  T.budget.map(b=>`<li>${b[0]} <b>${b[1]}</b></li>`).join('') +
  `<li class="total"><b>합계</b><b>${T.budgetTotal}</b></li>`;
</script>
</body>
</html>
