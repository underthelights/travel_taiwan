<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일자별 코스 ㅣ The Summer of Taipei</title>
<meta name="description" content="대만 세계여행 2박3일 일자별 코스와 지도.">
<meta name="theme-color" content="#f3ead8">
<link rel="canonical" href="https://underthelights.github.io/travel_taiwan/">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta property="og:type" content="website">
<meta property="og:locale" content="ko_KR">
<meta property="og:site_name" content="The Summer of Taipei">
<meta property="og:title" content="The Summer of Taipei">
<meta property="og:description" content="타이중에서 시작해 신주 미식과 타이베이 야시장을 지나는 2박3일 여행 플래너.">
<meta property="og:url" content="https://underthelights.github.io/travel_taiwan/">
<meta property="og:image" content="https://underthelights.github.io/travel_taiwan/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="day-page">
<nav class="nav">
  <a class="logo" href="index.html" aria-label="The Summer of Taipei 홈"><img src="assets/blog-icon.png" alt="">The Summer of Taipei</a>
  <a href="index.html">홈</a>
  <a href="day.html?d=1" class="d1" id="nav1">1일차</a>
  <a href="day.html?d=2" class="d2" id="nav2">2일차</a>
  <a href="day.html?d=3" class="d3" id="nav3">3일차</a>
  <a href="eat.html">먹킷리스트</a>
  <a href="train.html">교통</a>
  <a href="info.html">준비물</a>
</nav>
<script src="nav.js"></script>

<main class="day-shell">
  <section class="day-hero-panel" id="dayHero" aria-labelledby="dTitle">
    <figure class="day-hero-media">
      <img id="dayHeroImg" src="assets/taipei-skyline-sunset.jpg" alt="">
    </figure>
    <div class="day-hero-shade" aria-hidden="true"></div>
    <div class="day-hero-copy">
      <span class="day-label" id="dTag"></span>
      <span class="day-overline" id="dayOverline"></span>
      <h1 id="dTitle"></h1>
      <p id="dTheme"></p>
      <div class="day-stat-grid" id="dayStats" aria-label="오늘 일정 요약"></div>
    </div>
    <div class="day-hero-actions">
      <a class="routebtn" id="routeBtn">오늘 경로</a>
      <a class="routebtn secondary" id="kmlBtn">KML</a>
    </div>
    <div class="day-wordmark" id="dayWordmark" aria-hidden="true"></div>
  </section>

  <section class="day-control-row" aria-label="일정 분류 필터">
    <div class="kindbar" id="kindBar"></div>
  </section>

  <section class="daylayout">
    <section class="timeline-panel" aria-label="오늘의 시간표">
      <div class="timeline-head">
        <span class="mini-label">TIMELINE</span>
        <h2>오늘의 동선</h2>
      </div>
      <div class="timeline" id="timeline"></div>
    </section>
    <aside class="day-side">
      <div class="map-panel">
        <span class="mini-label">LIVE MAP</span>
        <div id="dayMap"></div>
      </div>
      <div class="detail" id="detail"></div>
    </aside>
  </section>
</main>

<script src="data.js"></script>
<script>
const T = window.TRIP;
const params = new URLSearchParams(location.search);
let day = parseInt(params.get('d'))||1;
if(![1,2,3].includes(day)) day=1;

// nav active
document.getElementById('nav'+day).classList.add('active');

const list = T.places.filter(p=>p.day===day);
const color = T.dayColor[day];
const stripEmoji = s => String(s || '').replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\uFE0F]/gu,'').replace(/\s+/g,' ').trim();
const visual = {
  1: {title:'타이중 → 신주 → 닝샤', summary:'7곳 · 공항 도착부터 닝샤 야시장까지', image:'assets/hsinchu-temple-night.jpg', alt:'신주 성황묘 주변 밤거리', overline:'WEST COAST OPENING', word:'HSINCHU'},
  2: {title:'타이베이 시티 데이', summary:'6곳 · 아침 식사부터 라오허 야시장까지', image:'assets/taipei-yongkang-morning.jpg', alt:'타이베이 융캉제 아침 거리', overline:'TAIPEI CITY DAY', word:'TAIPEI'},
  3: {title:'완화·시먼딩 → 귀국', summary:'5곳 · 완화 산책 후 타이중 공항으로', image:'assets/taipei-skyline-sunset.jpg', alt:'석양의 타이베이 스카이라인', overline:'WANHUA RETURN RUN', word:'WANHUA'},
}[day];

document.getElementById('dTag').textContent = T.dayLabel[day];
document.getElementById('dTag').style.setProperty('--day-color', color);
document.getElementById('dTitle').textContent = visual.title;
document.getElementById('dTheme').textContent = visual.summary;
document.getElementById('dayOverline').textContent = visual.overline;
document.getElementById('dayWordmark').textContent = visual.word;
document.getElementById('dayHeroImg').src = visual.image;
document.getElementById('dayHeroImg').alt = visual.alt;
document.body.style.setProperty('--day-color', color);
document.body.style.setProperty('--day-color-soft', color + '28');
const kindCount = kind => list.filter(p=>p.kind===kind).length;
document.getElementById('dayStats').innerHTML = [
  ['NODES', String(list.length).padStart(2,'0')],
  ['START', list[0].time],
  ['END', list[list.length-1].time],
  ['FOOD', String(kindCount('food')).padStart(2,'0')],
  ['SIGHT', String(kindCount('sight')).padStart(2,'0')],
  ['MOVE', String(kindCount('move')).padStart(2,'0')],
].map(([k,v])=>`<div><span>${k}</span><b>${v}</b></div>`).join('');

// ===== map =====
const map = L.map('dayMap').setView([list[0].lat,list[0].lng],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const markers={};
list.forEach((p,i)=>{
  const icon = L.divIcon({className:'', html:`<div class="marker-pin" style="background:${color}"><span>${i+1}</span></div>`, iconSize:[26,26], iconAnchor:[13,26], popupAnchor:[0,-26]});
  const m = L.marker([p.lat,p.lng],{icon}).addTo(map);
  m.bindPopup(`<b>${p.time}</b> ${p.name}<br>${stripEmoji(p.cat)}`);
  m.on('mouseover',()=>{m.openPopup(); showDetail(p);});
  m.on('click',()=>select(p,true));
  markers[p.id]=m;
});
// route line
L.polyline(list.map(p=>[p.lat,p.lng]),{color,weight:2,opacity:.5,dashArray:'6 8'}).addTo(map);
map.fitBounds(L.featureGroup(Object.values(markers)).getBounds().pad(0.2));

// ===== timeline (구간 이동 포함, 트리플식) =====
const tl = document.getElementById('timeline');
tl.innerHTML = list.map((p,i)=>{
  const km = T.placeKindMeta[p.kind] || {icon:'',label:'',color:'#888'};
  return `
  <div class="tl-leg" data-kind="${p.kind}"><span class="tl-leg-line"></span>
    <span class="tl-leg-txt"><b>MOVE</b> ${stripEmoji(p.move.mode)} ${p.move.min}${p.move.cost!=='-'?' · '+p.move.cost:''} <em>${p.move.note}</em></span>
  </div>
  <article class="tl-item" data-id="${p.id}" data-kind="${p.kind}" style="--item-color:${km.color}">
    <div class="tl-num" style="background:${color}">${String(i+1).padStart(2,'0')}</div>
    <div class="tl-card-main">
      <div class="tl-time">${p.time} <span class="tl-stay">· ${p.stay} 머무름</span></div>
      <div class="tl-name">${p.name} ${p.badge?`<span class="tl-badge">${p.badge}</span>`:''}</div>
      <div class="tl-cat"><span class="tl-kind" style="color:${km.color}; border-color:${km.color}66">${km.icon} ${km.label}</span> ${stripEmoji(p.cat)}</div>
    </div>
  </article>`;
}).join('');
tl.querySelectorAll('.tl-item').forEach(el=>{
  const p = list.find(x=>x.id==el.dataset.id);
  el.onmouseenter=()=>showDetail(p);
  el.onclick=()=>select(p,true);
});

// ===== 분류 필터 ([분류] 메뉴) =====
const kindBar = document.getElementById('kindBar');
const kindOrder = Object.keys(T.placeKindMeta);
const kindsInDay = [...new Set(list.map(p=>p.kind))].sort((a,b)=>kindOrder.indexOf(a)-kindOrder.indexOf(b));
kindBar.innerHTML = ['all', ...kindsInDay].map(k=>{
  if(k==='all') return `<button class="kind-chip active" data-kind="all">전체 <b>${list.length}</b></button>`;
  const m=T.placeKindMeta[k], n=list.filter(p=>p.kind===k).length;
  return `<button class="kind-chip" data-kind="${k}" style="--kc:${m.color}">${m.icon} ${m.label} <b>${n}</b></button>`;
}).join('');
function applyFilter(k){
  kindBar.querySelectorAll('.kind-chip').forEach(c=>c.classList.toggle('active', c.dataset.kind===k));
  tl.querySelectorAll('.tl-item').forEach(el=>{
    const p=list.find(x=>x.id==el.dataset.id);
    el.style.display = (k==='all'||p.kind===k)?'':'none';
  });
  tl.querySelectorAll('.tl-leg').forEach(el=>{ el.style.display=(k==='all'||el.dataset.kind===k)?'':'none'; });
  const shown=[];
  list.forEach(p=>{
    const show = k==='all'||p.kind===k;
    if(show){ if(!map.hasLayer(markers[p.id])) markers[p.id].addTo(map); shown.push(markers[p.id]); }
    else if(map.hasLayer(markers[p.id])) map.removeLayer(markers[p.id]);
  });
  if(shown.length) map.fitBounds(L.featureGroup(shown).getBounds().pad(0.25));
  const firstVis = list.find(p=>k==='all'||p.kind===k);
  if(firstVis) showDetail(firstVis);
}
kindBar.querySelectorAll('.kind-chip').forEach(c=>c.onclick=()=>applyFilter(c.dataset.kind));

// ===== detail =====
function showDetail(p){
  document.getElementById('detail').innerHTML = `
    <span class="d-day" style="background:${color}">${T.dayLabel[p.day]}</span>
    <div class="d-time">${p.time}</div>
    <div class="d-name">${p.name} ${p.badge?`<span class="tl-badge">${p.badge}</span>`:''}</div>
    <div class="d-cat">${stripEmoji(p.cat)} · ${p.stay} 머무름</div>
    <div class="d-leg"><b>오는 길</b> ${stripEmoji(p.move.mode)} ${p.move.min}${p.move.cost!=='-'?' · '+p.move.cost:''} <span>(${p.move.note})</span></div>
    <div class="d-desc">${stripEmoji(p.desc)}</div>
    <div class="d-tips">${stripEmoji(p.tips)}</div>
    <div class="d-addr">${p.addr}</div>
    <div class="d-actions">
      <a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank">구글맵 보기</a>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}&travelmode=transit" target="_blank">길찾기</a>
    </div>`;
}
function select(p, fly){
  showDetail(p);
  if(fly){ map.flyTo([p.lat,p.lng],14,{duration:.8}); markers[p.id].openPopup(); }
  document.querySelectorAll('.tl-item').forEach(el=>el.classList.toggle('sel', el.dataset.id==p.id));
}
// URL ?kind= 파라미터로 초기 필터 (상단 메가메뉴에서 진입)
const initKind = params.get('kind');
const validKind = initKind && T.placeKindMeta[initKind] && list.some(p=>p.kind===initKind);
applyFilter(validKind ? initKind : 'all');

// ===== 오늘 경로 =====
document.getElementById('routeBtn').onclick=()=>{
  const origin=`${list[0].lat},${list[0].lng}`;
  const dest=`${list[list.length-1].lat},${list[list.length-1].lng}`;
  const way=list.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join('|');
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${way}&travelmode=transit`,'_blank');
};

// ===== KML 내보내기 (구글 마이맵 import용) — 전체 3일 =====
document.getElementById('kmlBtn').onclick=()=>{
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let styles='', folders='';
  [1,2,3].forEach(d=>{
    styles+=`<Style id="day${d}"><IconStyle><color>${T.kmlColor[d]}</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/paddle/${d}.png</href></Icon></IconStyle><LineStyle><color>${T.kmlColor[d]}</color><width>3</width></LineStyle></Style>`;
    const ls=T.places.filter(p=>p.day===d);
    let pm='';
    ls.forEach((p,i)=>{
      const desc=`Time ${p.time} · ${p.stay}\n${stripEmoji(p.cat)}\n\nMove ${stripEmoji(p.move.mode)} ${p.move.min} ${p.move.cost!=='-'?'· '+p.move.cost:''}\n(${p.move.note})\n\n${stripEmoji(p.desc)}\n\nTip ${stripEmoji(p.tips.replace(/<\/?b>/g,''))}\n\nAddress ${p.addr}`;
      pm+=`<Placemark><name>${i+1}. ${esc(p.name)}</name><description><![CDATA[${desc}]]></description><styleUrl>#day${d}</styleUrl><Point><coordinates>${p.lng},${p.lat},0</coordinates></Point></Placemark>`;
    });
    const coords=ls.map(p=>`${p.lng},${p.lat},0`).join(' ');
    pm+=`<Placemark><name>${esc(T.dayLabel[d])} 동선</name><styleUrl>#day${d}</styleUrl><LineString><tessellate>1</tessellate><coordinates>${coords}</coordinates></LineString></Placemark>`;
    folders+=`<Folder><name>${esc(T.dayLabel[d])} — ${esc(T.dayTheme[d])}</name>${pm}</Folder>`;
  });
  const kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(T.meta.title)}</name>${styles}${folders}</Document></kml>`;
  const blob=new Blob([kml],{type:'application/vnd.google-earth.kml+xml'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='taiwan_trip.kml'; a.click();
};
</script>
</body>
</html>
